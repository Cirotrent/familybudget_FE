<mat-sidenav-container style="height: 100vh">

  <!-- SIDEBAR -->
  <mat-sidenav mode="side" opened>

    <h3 style="margin: 16px">Menu</h3>

    <mat-nav-list>

      <a mat-list-item routerLink="/">Home</a>

      <a mat-list-item routerLink="/dashboard">Dashboard</a>

      <a mat-list-item routerLink="/families">Famiglie</a>

    </mat-nav-list>

    <div style="margin: 16px">

      <!-- USER -->
      <div *ngIf="auth.isLogged()">
        <p>👤 {{ auth.getFullName() || auth.getUsername() }}</p>
        <p style="font-size:12px; color:gray">
          {{ auth.getEmail() }}
        </p>

        <button mat-button color="warn" (click)="logout()">
          Logout
        </button>
      </div>

      <div *ngIf="!auth.isLogged()">
        <button mat-raised-button color="primary" (click)="auth.init()">
          Login
        </button>
        <button mat-button (click)="auth.register()">
          Registrati
        </button>
      </div>

    </div>

  </mat-sidenav>

  <!-- CONTENUTO -->
  <mat-sidenav-content>

    <mat-toolbar color="primary">
      
    </mat-toolbar>

    <div style="padding: 20px">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
